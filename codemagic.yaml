workflows:
  android-release:
    name: Android Release (APK)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.6
      android_signing:
        - taskflow_keystore
      vars:
        BUILD_ENV: prod
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release \
            --dart-define=BUILD_ENV=prod \
            -Pkotlin.incremental=false
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - liem.dt0208@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: iOS Release (IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.6
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.taskflow.mobile
      vars:
        BUILD_ENV: prod
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --dart-define=BUILD_ENV=prod \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - liem.dt0208@gmail.com
        notify:
          success: true
          failure: true
