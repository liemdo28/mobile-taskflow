name: mobile_taskflow
description: TaskFlow Mobile App - Android & iOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management ──────────────────────────────────────────
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # ── Networking ────────────────────────────────────────────────
  dio: ^5.4.0
  dio_cache_interceptor: ^4.0.6

  # ── Local storage ─────────────────────────────────────────────
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # ── UI ────────────────────────────────────────────────────────
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2

  # ── Calendar ──────────────────────────────────────────────────
  table_calendar: ^3.0.9

  # ── Utilities ────────────────────────────────────────────────
  intl: any
  uuid: ^4.3.3
  timeago: ^3.6.1
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  file_picker: ^11.0.2
  url_launcher: ^6.2.4
  app_links: ^6.0.0

  # ── Push Notifications ────────────────────────────────────────
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0

  # ── Forms & Validation ───────────────────────────────────────
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # ── Misc ─────────────────────────────────────────────────────
  connectivity_plus: ^7.1.0
  package_info_plus: ^9.0.1
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # Assets (placeholder directories)
  assets:
    - assets/images/
    - assets/icons/

  # Note: Custom Inter fonts commented out to avoid build errors
  # Uncomment when font files are available:
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
